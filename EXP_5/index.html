<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Salary Management</title>
</head>
<body>
    
    <div class="backdrop">

        <h2>Employee Salary Management System</h2>

        <input type="text" name="emp_name" id="emp_name" placeholder="Employee name">
        <input type="text" name="emp_id" id="emp_id" placeholder="Employee ID">
        <input type="number" name="salary" id="salary" placeholder="Salary">
        <input type="text" name="dep" id="dep" placeholder="Department">


        <button id="add_emp">ADD EMPLOYEE</button>
        <button id="disp">DISPLAY ALL DETAILS</button>
        <button id="total">TOTAL SALARY</button>
        <button id="filter">FILTER SALARY</button>
        <button id="avg">AVERAGE SALARY</button>
        <button id="count">COUNT BY DEPARTMENT</button>

    </div>

</body>
</html>
