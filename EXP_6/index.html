<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Handling</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">

        <h2 id="mainheading">Welcome to JavaScript Lab</h2>
        <input type="text" id="userinput" placeholder="enter a new heading"> <br>

        <button id="changetext">Change Heading</button>
        <button id="bgcolor">Change Background</button>
        <button id="fontsize">Increase font size</button>
        <button id="toggle">Show/Hide paragraph</button>
        <button id="reset">Reset</button>

        <p id="paragraph">
            This is a sample paragraph. JavaScript events can dynamically change content.
        </p>

    </div>


    <script src="main.jsx"></script>

</body>
</html>
